server.port=8081
server.servlet.context-path=/spring-ai

# Gemini AI Configuration
# Note: Get your API Key from https://aistudio.google.com/
spring.ai.google.genai.api-key=${GEMINI_API_KEY:AIzaSyA5_f6PATE00LSQ3qMot-gWS8eZueFCMkY}
spring.ai.google.genai.chat.options.model=gemini-2.5-flash
spring.ai.google.genai.chat.options.max-output-tokens=500

# Embedding Configuration
spring.ai.google.genai.embedding.api-key=${GEMINI_API_KEY:AIzaSyA5_f6PATE00LSQ3qMot-gWS8eZueFCMkY}
# Using a dummy project-id to satisfy the starter's internal assertion (not used for API Key mode)
spring.ai.google.genai.embedding.project-id=dummy-project
# Observability & Metrics
management.endpoints.web.exposure.include=health,metrics,info
management.metrics.export.simple.enabled=true
management.observations.key-values.spring.ai.enabled=true
