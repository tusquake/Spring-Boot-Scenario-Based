# Scenario 24: Distributed Tracing Configuration
management.tracing.sampling.probability=1.0
management.zipkin.tracing.enabled=false
logging.pattern.level=%5p [${appName:-},%X{traceId:-},%X{spanId:-}]

# Scenario 23: Resilience4j Configuration
resilience4j.circuitbreaker.instances.externalService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.externalService.minimum-number-of-calls=4
resilience4j.circuitbreaker.instances.externalService.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.externalService.sliding-window-size=10
resilience4j.circuitbreaker.instances.externalService.register-health-indicator=true

# Actuator: Expose Resilience4j and Metrics endpoints
management.endpoints.web.exposure.include=health,info,circuitbreakers,metrics,env,beans
management.endpoint.health.show-details=always
management.health.circuitbreakers.enabled=true

server.port=8080
spring.application.name=debug-challenge

# H2 Console Configuration
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# DataSource Configuration
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;LOCK_TIMEOUT=7000
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# THE FIX: Graceful Shutdown
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=10s

# Scenario 18: Custom Starter Configuration
custom.starter.enabled=false

# Scenario 29: Multipart Configuration
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Scenario 36: Type-Safe Configuration
app.daily-dev.welcome-message=Welcome to the Daily Dev Scenario!
app.daily-dev.max-retry-attempts=3
app.daily-dev.support-emails=dev-team@company.com,ops-team@company.com
app.daily-dev.feature-flags.new-ui=true
app.daily-dev.feature-flags.beta-mode=false

# Scenario 40: Feature Toggles
app.feature.beta-enabled=true

# Scenario 41: Advanced @Value
# app.config.api-key=SECRET_PROD_12345 (Commented out to show default value behavior)
