server.port=8080
spring.application.name=debug-challenge

# H2 Console Configuration
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# DataSource Configuration
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# JPA/Hibernate
# THE FIX: We'll use 'update' so previous scenarios' tables are created, 
# while Flyway still runs its versioned scripts.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# THE FIX: Graceful Shutdown
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=10s

# Scenario 18: Custom Starter Configuration
custom.starter.enabled=false
